name: verify

# Automated quality gate for the push -> Cloudflare-Pages deploy path, which
# previously had NO gate (every render crash this project shipped reached the
# live pilot through an ungated push to main).
#
#   gate         â€” BLOCKING. The static checks that catch the bug classes that
#                  actually reached production:
#                    * render crashes: undeclared identifiers in React hook
#                      dependency arrays (data / onPlayAudio / isEscaped)
#                    * dead modules: files that don't parse / won't load
#                      (platetectonics) â€” check_render_refs parse-gating
#                    * corrupt lang packs (check_lang_json)
#                    * Ctrl+K command palette regressing to English-only â€”
#                      manifest stale or a pack missing keys (check_cmd_i18n)
#                    * broken AlloModules registry / view-module props / icons
#                  Make this a REQUIRED status check in branch protection to
#                  truly block merges to main.
#   verify-full  â€” NON-BLOCKING. The full ~40-check suite, for visibility. It
#                  currently surfaces known pre-existing debt (76 missing t()
#                  keys, deploy-mirror drift) â€” reported, not enforced, so it
#                  never blocks while that debt is paid down.
#   smoke        â€” NON-BLOCKING. Playwright opens each major surface against the
#                  deployed demo and asserts no fatal/ErrorBoundary. Regression
#                  detection (tests whatever is live), not a pre-merge gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Static gate (crash + load classes)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: verify:gate (render-refs + lang-json + module contracts)
        run: npm run verify:gate

  unit:
    name: Unit + golden-master tests (vitest)
    # BLOCKING. The vitest suite (~1,485 tests as of 2026-06) is deterministic and green; it
    # includes the golden-master characterization tests (word_sounds, arc_city,
    # symbol_studio, dino_lab) that pin tool render + data behavior. Previously
    # these ran only locally â€” CI never executed `npm test`, so a render/data
    # regression in a pinned tool could reach main ungated.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      # The golden-master harnesses render with REAL React 18 resolved from
      # prismflow-deploy/node_modules (git-ignored, not populated by the root
      # install). Install just react + react-dom there so the harnesses load.
      - name: Install React 18 for golden-master harnesses
        run: npm install --no-audit --no-fund --no-save --prefix prismflow-deploy react@^18.2.0 react-dom@^18.2.0
      - name: npm test (golden masters + unit suites)
        run: npm test

  verify-full:
    name: Full verify suite (non-blocking visibility)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: npm run verify (surfaces translation gaps + mirror drift)
        run: npm run verify
      - name: Translation staleness (reworded English vs existing translations)
        # Non-blocking visibility: lists packs holding a translation of an English
        # string that changed since the lang_source_baseline.json snapshot. To make
        # the signal louder, append `--gate` (still non-blocking here under the job's
        # continue-on-error). if: always() so it runs even when the verify step above
        # reports pre-existing debt and exits non-zero.
        if: always()
        run: npm run verify:stale

  smoke:
    name: Render smoke â€” deployed demo (non-blocking)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Smoke â€” major surfaces open without a fatal error
        run: npx playwright test tests/e2e/11-render-smoke.spec.ts

  tag-tree:
    name: Tagged-PDF goldens (BLOCKING)
    # PROMOTED TO BLOCKING 2026-06-10 (strategic-audit item: "eight goldens,
    # two in CI and ignorable" was a credibility gap). This job carries every
    # DETERMINISTIC pipeline golden â€” the StructTreeRoot invariants, the
    # validator's non-vacuousness, validator/gate parity, cross-page MCR
    # linkage, and the AI-loop contracts (scripted Gemini â€” zero network).
    # All run the LOCAL doc_pipeline_module.js in Chromium (about:blank + CDN
    # pdf-lib). The CDN-HEAVY goldens (render-verification's font fetches,
    # Writing Check's ~10MB Harper WASM) live in the non-blocking job below â€”
    # network flake must not mask a real structure regression here.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Tag-tree golden master (createTaggedPdf structure invariants + round-trip)
        run: npx playwright test tests/e2e/pdf_tag_tree_golden.spec.ts
      - name: PdfValidator discrimination (the on-export self-check isn't vacuous)
        run: npx playwright test tests/e2e/pdf_validator_golden.spec.ts
      - name: Validator parity (in-app rules vs declaration gate)
        run: npx playwright test tests/e2e/validator_parity_golden.spec.ts
      - name: Multi-page cross-page MCR linkage
        run: npx playwright test tests/e2e/multipage_golden.spec.ts
      - name: AI-path contracts (scripted Gemini â€” plan/surgical/rewrite guards)
        run: npx playwright test tests/e2e/ai_path_golden.spec.ts
      - name: STEM golden (Formula role, Headers/IDTree, image-intel honesty)
        run: npx playwright test tests/e2e/stem_golden.spec.ts
      - name: Typeset-then-tag golden (Office-input tagged PDFs)
        run: npx playwright test tests/e2e/typeset_tagged_golden.spec.ts
      - name: Transcript-format golden (audio/video as first-class input)
        run: npx playwright test tests/e2e/transcript_golden.spec.ts

  verapdf:
    name: veraPDF ISO 14289-1 ground-truth gate (independent validator)
    # WHY THIS EXISTS: the tag-tree job above validates the exported PDFs against AlloFlow's
    # OWN exported_pdf_validator (a self-check). A reliability reviewer (Garry / Paul at UMaine)
    # would run the INDEPENDENT, ISO-grade veraPDF CLI instead. This job does exactly that: it
    # installs real veraPDF, regenerates the sourceâ†’tagged artifact pairs the tag-tree golden
    # produces, and runs dev-tools/verapdf_diff.cjs --gate â€” which FAILS on any ISO 14289-1 rule
    # that tagging INTRODUCED (the regression class), while excluding the by-design clause-5
    # declaration withholding. Until now the only veraPDF check auto-SKIPPED when the binary was
    # absent (i.e. always, in CI) â€” so CI was effectively self-grading. This makes the
    # ground-truth gate actually run on every push.
    #
    # NON-BLOCKING for its first landings (continue-on-error) because the veraPDF installer
    # can't be exercised on the dev machine â€” the install + launcher resolution has to be proven
    # on a real GitHub runner first. PROMOTE TO BLOCKING by deleting `continue-on-error: true`
    # once a green run confirms the installer lands the launcher (the job already fails loudly,
    # not silently, if veraPDF is missing or produces no artifact pairs â€” so a green run is real).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Install veraPDF (official greenfield CLI, headless auto-install)
        run: |
          set -euo pipefail
          curl -fsSL -o "$RUNNER_TEMP/verapdf-installer.zip" https://software.verapdf.org/releases/verapdf-installer.zip
          unzip -q "$RUNNER_TEMP/verapdf-installer.zip" -d "$RUNNER_TEMP/verapdf-installer"
          INSTALLER_JAR="$(find "$RUNNER_TEMP/verapdf-installer" -name 'verapdf-izpack-installer-*.jar' | head -1)"
          test -n "$INSTALLER_JAR" || { echo '::error::veraPDF installer jar not found in download'; exit 1; }
          sed "s#@@INSTALL_DIR@@#$HOME/verapdf#" dev-tools/verapdf_ci_autoinstall.xml > "$RUNNER_TEMP/verapdf-auto-install.xml"
          java -jar "$INSTALLER_JAR" "$RUNNER_TEMP/verapdf-auto-install.xml"
          test -x "$HOME/verapdf/verapdf" || { echo '::error::veraPDF launcher not installed (pack layout changed?)'; ls -la "$HOME/verapdf" 2>/dev/null || true; exit 1; }
          "$HOME/verapdf/verapdf" --version
          echo "VERAPDF_PATH=$HOME/verapdf/verapdf" >> "$GITHUB_ENV"
      - name: Generate sourceâ†’tagged PDF artifact pairs (tag-tree golden)
        run: npx playwright test tests/e2e/pdf_tag_tree_golden.spec.ts
      - name: Assert artifact pairs exist (gate must not be vacuous)
        run: |
          set -euo pipefail
          PAIRS="$(ls tests/e2e/artifacts/*.tagged.pdf 2>/dev/null | wc -l)"
          echo "tagged artifacts produced: $PAIRS"
          test "$PAIRS" -gt 0 || { echo '::error::tag-tree golden produced no .tagged.pdf artifacts â€” the veraPDF gate would be vacuous'; exit 1; }
      - name: veraPDF gate â€” tagging must not INTRODUCE an ISO 14289-1 failure
        run: node dev-tools/verapdf_diff.cjs --gate
      - name: Upload veraPDF diff record + artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verapdf-diff
          path: |
            a11y-audit/verapdf_diff_result.json
            tests/e2e/artifacts/*.pdf
          if-no-files-found: ignore

  cdn-goldens:
    name: CDN-heavy goldens (non-blocking â€” network flake tolerated)
    # render-verification fetches substitute fonts (pdfjs-dist CDN), the
    # Writing Check sentinel downloads the real ~10MB Harper WASM, PPTX export
    # builds real OOXML. Real coverage, but a CDN hiccup must not block merges
    # â€” visible-but-advisory. Promote after observed stability.
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Render verification (ink coverage + font-subsetting canary)
        run: npx playwright test tests/e2e/render_verification_golden.spec.ts
      - name: PPTX export golden (OOXML structure + media preservation)
        run: npx playwright test tests/e2e/pptx_export_golden.spec.ts
      - name: Writing Check sentinel (real Harper WASM lint)
        run: npx playwright test tests/e2e/writing_check_golden.spec.ts
      - name: OMML math chain (temml + mathml2omml CDN â€” Word-native equations)
        run: npx playwright test tests/e2e/omml_math_golden.spec.ts
