# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=image_gen:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=tts:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Rate limited: Image generation (1 req/sec per IP, burst of 5)
    location ~* /v1/images {
        limit_req zone=image_gen burst=5 nodelay;
        proxy_pass http://localhost:7860;
        proxy_http_version 1.1;
    }

    # Rate limited: TTS (10 req/sec per IP, burst of 20)
    location ~* /v1/audio {
        limit_req zone=tts burst=20 nodelay;
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
    }

    # Rate limited: General API (30 req/sec per IP, burst of 50)
    location ~* /v1/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
    }

    # Allow large uploads (for image editing)
    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
