# ══════════════════════════════════════════════════════════════════
#  AlloFlow "School Box" — Complete Local AI Stack
#
#  Run:  cd docker && docker compose up -d
#
#  Services:
#    Frontend (Nginx)  → port 3000  (AlloFlow React app)
#    PocketBase (DB)   → port 8090  (local database, replaces Firebase)
#    Ollama (LLM)      → port 11434 (text generation)
#    Flux (Image Gen)  → port 7860  (text-to-image, requires GPU)
#    Edge TTS (Speech) → port 5001  (neural text-to-speech)
#    Piper (TTS)       → port 10200 (offline TTS fallback)
#    SearXNG (Search)  → port 8888  (web search for grounding)
#
#  Minimal (no GPU):
#    docker compose up -d frontend pocketbase ollama piper searxng
#
#  Full (with GPU):
#    docker compose up -d
# ══════════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── Frontend (AlloFlow React App via Nginx) ────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        REACT_APP_DATA_BACKEND: auto
        REACT_APP_POCKETBASE_URL: http://localhost:8090
    container_name: alloflow-frontend
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  # ── Local Database (PocketBase — replaces Firebase) ────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: alloflow-pocketbase
    ports:
      - "${PB_PORT:-8090}:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
      - ./pocketbase/pb_schema.json:/pb/pb_migrations/schema.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── LLM Backend (Ollama) ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: alloflow-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Image Generation (Flux.1-schnell — requires GPU) ──────────
  flux:
    build:
      context: ./flux-server
      dockerfile: Dockerfile
    container_name: alloflow-flux
    ports:
      - "${FLUX_PORT:-7860}:7860"
    environment:
      - FLUX_MODEL=black-forest-labs/FLUX.1-schnell
      - PORT=7860
      - MAX_IMAGE_SIZE=1024
      - HF_HOME=/models
    volumes:
      - flux_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    profiles:
      - gpu  # Only starts with: docker compose --profile gpu up -d

  # ── Neural TTS (Edge TTS — 28 voices, 20 languages) ──────────
  edge-tts:
    build:
      context: ./edge-tts-server
      dockerfile: Dockerfile
    container_name: alloflow-edge-tts
    ports:
      - "${TTS_PORT:-5001}:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Offline TTS (Piper — 40+ languages, no internet needed) ───
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: alloflow-piper
    ports:
      - "${PIPER_PORT:-10200}:10200"
    volumes:
      - piper_data:/data
    command: >
      --voice en_US-amy-medium
      --data-dir /data
      --download-dir /data
    restart: unless-stopped

  # ── Web Search (SearXNG — privacy-first, no tracking) ─────────
  searxng:
    image: searxng/searxng:latest
    container_name: alloflow-searxng
    ports:
      - "${SEARCH_PORT:-8888}:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng
    restart: unless-stopped

volumes:
  pocketbase_data:
  ollama_data:
  flux_models:
  piper_data:
  searxng_data:
