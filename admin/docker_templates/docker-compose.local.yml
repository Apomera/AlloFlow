  #   image: black-forest-labs/flux-pro:latest
  #   container_name: alloflow-flux
  #   restart: unless-stopped
  #   ports:
  #     - "7860:7860"
  #   environment:
  #     CUDA_VISIBLE_DEVICES: "0"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:7860/"]
  #     interval: 30s
