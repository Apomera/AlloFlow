name: verify

# Automated quality gate for the push -> Cloudflare-Pages deploy path, which
# previously had NO gate (every render crash this project shipped reached the
# live pilot through an ungated push to main).
#
#   gate         — BLOCKING. The static checks that catch the bug classes that
#                  actually reached production:
#                    * render crashes: undeclared identifiers in React hook
#                      dependency arrays (data / onPlayAudio / isEscaped)
#                    * dead modules: files that don't parse / won't load
#                      (platetectonics) — check_render_refs parse-gating
#                    * corrupt lang packs (check_lang_json)
#                    * broken AlloModules registry / view-module props / icons
#                  Make this a REQUIRED status check in branch protection to
#                  truly block merges to main.
#   verify-full  — NON-BLOCKING. The full ~40-check suite, for visibility. It
#                  currently surfaces known pre-existing debt (76 missing t()
#                  keys, deploy-mirror drift) — reported, not enforced, so it
#                  never blocks while that debt is paid down.
#   smoke        — NON-BLOCKING. Playwright opens each major surface against the
#                  deployed demo and asserts no fatal/ErrorBoundary. Regression
#                  detection (tests whatever is live), not a pre-merge gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Static gate (crash + load classes)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: verify:gate (render-refs + lang-json + module contracts)
        run: npm run verify:gate

  unit:
    name: Unit + golden-master tests (vitest)
    # BLOCKING. The vitest suite (~1,485 tests as of 2026-06) is deterministic and green; it
    # includes the golden-master characterization tests (word_sounds, arc_city,
    # symbol_studio, dino_lab) that pin tool render + data behavior. Previously
    # these ran only locally — CI never executed `npm test`, so a render/data
    # regression in a pinned tool could reach main ungated.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      # The golden-master harnesses render with REAL React 18 resolved from
      # prismflow-deploy/node_modules (git-ignored, not populated by the root
      # install). Install just react + react-dom there so the harnesses load.
      - name: Install React 18 for golden-master harnesses
        run: npm install --no-audit --no-fund --no-save --prefix prismflow-deploy react@^18.2.0 react-dom@^18.2.0
      - name: npm test (golden masters + unit suites)
        run: npm test

  verify-full:
    name: Full verify suite (non-blocking visibility)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: npm run verify (surfaces translation gaps + mirror drift)
        run: npm run verify

  smoke:
    name: Render smoke — deployed demo (non-blocking)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Smoke — major surfaces open without a fatal error
        run: npx playwright test tests/e2e/11-render-smoke.spec.ts

  tag-tree:
    name: Tagged-PDF goldens (BLOCKING)
    # PROMOTED TO BLOCKING 2026-06-10 (strategic-audit item: "eight goldens,
    # two in CI and ignorable" was a credibility gap). This job carries every
    # DETERMINISTIC pipeline golden — the StructTreeRoot invariants, the
    # validator's non-vacuousness, validator/gate parity, cross-page MCR
    # linkage, and the AI-loop contracts (scripted Gemini — zero network).
    # All run the LOCAL doc_pipeline_module.js in Chromium (about:blank + CDN
    # pdf-lib). The CDN-HEAVY goldens (render-verification's font fetches,
    # Writing Check's ~10MB Harper WASM) live in the non-blocking job below —
    # network flake must not mask a real structure regression here.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Tag-tree golden master (createTaggedPdf structure invariants + round-trip)
        run: npx playwright test tests/e2e/pdf_tag_tree_golden.spec.ts
      - name: PdfValidator discrimination (the on-export self-check isn't vacuous)
        run: npx playwright test tests/e2e/pdf_validator_golden.spec.ts
      - name: Validator parity (in-app rules vs declaration gate)
        run: npx playwright test tests/e2e/validator_parity_golden.spec.ts
      - name: Multi-page cross-page MCR linkage
        run: npx playwright test tests/e2e/multipage_golden.spec.ts
      - name: AI-path contracts (scripted Gemini — plan/surgical/rewrite guards)
        run: npx playwright test tests/e2e/ai_path_golden.spec.ts

  cdn-goldens:
    name: CDN-heavy goldens (non-blocking — network flake tolerated)
    # render-verification fetches substitute fonts (pdfjs-dist CDN), the
    # Writing Check sentinel downloads the real ~10MB Harper WASM, PPTX export
    # builds real OOXML. Real coverage, but a CDN hiccup must not block merges
    # — visible-but-advisory. Promote after observed stability.
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Install Playwright chromium
        run: npx playwright install chromium
      - name: Render verification (ink coverage + font-subsetting canary)
        run: npx playwright test tests/e2e/render_verification_golden.spec.ts
      - name: PPTX export golden (OOXML structure + media preservation)
        run: npx playwright test tests/e2e/pptx_export_golden.spec.ts
      - name: Writing Check sentinel (real Harper WASM lint)
        run: npx playwright test tests/e2e/writing_check_golden.spec.ts
