# AlloFlow School Box — Nginx Configuration
# Serves the React SPA and proxies API calls to backend services

# Upstream definitions for backend services
upstream ollama_backend {
    server ollama:11434;
}
upstream pocketbase_backend {
    server pocketbase:8090;
}
upstream flux_backend {
    server flux:7860;
}
upstream edgetts_backend {
    server edge-tts:5001;
}
upstream piper_backend {
    server piper:10200;
}
upstream searxng_backend {
    server searxng:8080;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing — serve index.html for all non-file routes ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Ollama LLM API ──
    # AlloFlow's AIProvider calls /api/ollama/* for text generation
    location /api/ollama/ {
        proxy_pass http://ollama_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;  # LLM generation can take a while
        proxy_buffering off;      # Stream responses
    }

    # ── PocketBase API ──
    # DataProvider calls /api/pocketbase/* for CRUD + realtime SSE
    location /api/pocketbase/ {
        proxy_pass http://pocketbase_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;  # SSE connections are long-lived
        proxy_buffering off;
    }
    # PocketBase health check (used by auto-detection)
    location = /api/health {
        proxy_pass http://pocketbase_backend/api/health;
    }

    # ── Flux Image Generation ──
    # AIProvider calls /api/flux/* for text-to-image and image editing
    location /api/flux/ {
        proxy_pass http://flux_backend/;
        proxy_set_header Host $host;
        proxy_read_timeout 180s;  # Image gen can be slow
        proxy_buffering off;
        client_max_body_size 50M;  # Allow image uploads
    }

    # ── Edge TTS (Neural text-to-speech) ──
    location /api/tts/ {
        proxy_pass http://edgetts_backend/;
        proxy_set_header Host $host;
    }

    # ── Piper TTS (Offline fallback) ──
    location /api/piper/ {
        proxy_pass http://piper_backend/;
        proxy_set_header Host $host;
    }

    # ── SearXNG Web Search ──
    # WebSearchProvider calls /api/search/* for grounded fact-checking
    location /api/search/ {
        proxy_pass http://searxng_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Static asset caching ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Allow large uploads (for image editing, PDF uploads)
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
