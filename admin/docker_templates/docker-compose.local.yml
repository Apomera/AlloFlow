# ============================================================================
# AlloFlow Local Stack - Full Setup with All Services
# ============================================================================
# For standalone installations with complete AI capabilities
# Edit this file to enable/disable services as needed

version: '3.8'

services:
  # ============================================================================
  # DATABASE & API (Required)
  # ============================================================================
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: alloflow-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb_data
      - pb_hooks:/pb_hooks
    environment:
      # SECURITY: Change these in production!
      POCKETBASE_ADMIN_EMAIL: admin@alloflow.local
      POCKETBASE_ADMIN_PASSWORD: alloflow_default_please_change
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alloflow
    labels:
      - "alloflow=database"

  # ============================================================================
  # LLM Inference Engine (Required)
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: alloflow-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Allow listening on all interfaces
      OLLAMA_HOST: 0.0.0.0:11434
      # GPU support (set to 0 or omit for CPU-only)
      NVIDIA_VISIBLE_DEVICES: all
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - alloflow
    labels:
      - "alloflow=llm"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ============================================================================
  # Text-to-Speech Service (Required)
  # ============================================================================
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: alloflow-piper
    restart: unless-stopped
    ports:
      - "10400:10400"
    command: --voice en_US-lessac-medium
    healthcheck:
      test: ["CMD-SHELL", "echo healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alloflow
    labels:
      - "alloflow=tts"

  # ============================================================================
  # Meta-Search Engine (Required)
  # ============================================================================
  searxng:
    image: searxng/searxng:latest
    container_name: alloflow-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      BASE_URL: http://localhost:8888/
      IMAGE_PROXY: "true"
      SEARXNG_SECRET: alloflow_default_secret_change_me
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alloflow
    labels:
      - "alloflow=search"

# ============================================================================
# OPTIONAL SERVICES - Uncomment to enable
# ============================================================================

  # ============================================================================
  # Image Generation (Optional - High VRAM requirement)
  # ============================================================================
  # Uncomment this section to enable image generation with Flux
  # WARNING: Requires NVIDIA GPU with 12GB+ VRAM
  # On CPU: Very slow (10-40 minutes per image)
