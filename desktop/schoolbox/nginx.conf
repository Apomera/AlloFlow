upstream ollama_backend {
    server ollama:11434;
}

upstream pocketbase_backend {
    server pocketbase:8090;
}

upstream piper_backend {
    server piper:10200;
}

upstream searxng_backend {
    server searxng:8080;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ollama/ {
        proxy_pass http://ollama_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /api/pocketbase/ {
        proxy_pass http://pocketbase_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location = /api/health {
        proxy_pass http://pocketbase_backend/api/health;
    }

    location /api/piper/ {
        proxy_pass http://piper_backend/;
        proxy_set_header Host $host;
    }

    location /api/search/ {
        proxy_pass http://searxng_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    client_max_body_size 50M;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
