<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AlloFlow Whiteboard</title>
<!--
  AlloFlow Whiteboard — Excalidraw + education graphic-organizer templates
  (companion window).

  Opened by stem_lab/stem_tool_whiteboard.js with window.open (the escape-hatch
  pattern: a TOP-LEVEL browsing context, unaffected by Gemini Canvas's sandboxed
  iframe). A freehand sketch/diagram surface for "multiple means of expression"
  (UDL) — students draw their thinking; teachers make quick visuals.

  The canvas is Excalidraw (excalidraw.com, MIT), loaded as a UMD library +
  React 18 from a CDN and mounted into a <div> (no iframe → no X-Frame-Options
  problem; same CDN-library pattern as the Molecule/Zoom shelves). Its own CSS
  is self-injected by the bundle; fonts load from EXCALIDRAW_ASSET_PATH.

  The AlloFlow layer is a set of EDUCATION TEMPLATES — graphic organizers
  (Venn, T-chart, story map, KWL, concept web, number line) that seed the canvas
  as a starting scaffold — plus a one-click PNG export. Excalidraw's own menu
  handles save / open / export to SVG / .excalidraw. Nothing is sent anywhere;
  drawings live in this window until you export them.

  NOTE (2026-07-06): Excalidraw@0.17.6 UMD (window.ExcalidrawLib) +
  convertToExcalidrawElements + exportToBlob verified present on the CDN, and
  React 18 UMD loads, but the full canvas render is NOT yet browser-smoke-tested.
-->
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --line:#334155; --text:#e2e8f0; --dim:#94a3b8; --accent:#6366f1; --accent2:#4f46e5; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: var(--panel); border-bottom: 1px solid var(--line); flex: 0 0 auto; flex-wrap: wrap; }
  header h1 { font-size: 14px; margin: 0; font-weight: 700; }
  header .sub { color: var(--dim); font-size: 11px; }
  header .spacer { flex: 1 1 auto; }
  .tpl { display: flex; align-items: center; gap: 6px; }
  .tpl label { font-size: 11px; color: var(--dim); }
  select, button.hdr { background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; font-family: inherit; }
  button.hdr:hover, select:hover { border-color: var(--accent); }
  button.primary { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: 700; }
  button.primary:hover { background: var(--accent); }
  #excal { flex: 1 1 auto; min-height: 0; position: relative; }
  .loadmsg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 14px; text-align: center; padding: 24px; }
  .privacy { padding: 5px 12px; background: var(--panel); border-top: 1px solid var(--line); font-size: 10.5px; color: #6b7aa8; flex: 0 0 auto; }
  /* Excalidraw renders light by default; give it a clean light ground below the dark chrome. */
  .excalidraw { --color-primary: #4f46e5; }
</style>
</head>
<body>
<header>
  <h1>✏️ AlloFlow Whiteboard</h1>
  <span class="sub">Excalidraw · draw, diagram, and organize ideas</span>
  <span class="spacer"></span>
  <div class="tpl">
    <label for="tplSel">📋 Template</label>
    <select id="tplSel" aria-label="Insert a graphic-organizer template">
      <option value="">Blank canvas</option>
      <option value="venn">Venn diagram (compare 2)</option>
      <option value="tchart">T-chart (2 columns)</option>
      <option value="story">Story map (beginning · middle · end)</option>
      <option value="kwl">KWL chart (Know · Want · Learned)</option>
      <option value="web">Concept web</option>
      <option value="numline">Number line (0–10)</option>
    </select>
  </div>
  <button class="hdr primary" id="exportBtn" aria-label="Export the drawing as a PNG image">⬇️ Export PNG</button>
</header>
<div id="excal"><div class="loadmsg" id="loadmsg">Loading the whiteboard…</div></div>
<div class="privacy">Private: your drawing stays in this window until you export or save it. Nothing is sent anywhere. Use Export PNG here, or Excalidraw’s menu (top-left) to save an editable .excalidraw file or an SVG.</div>

<script>window.EXCALIDRAW_ASSET_PATH = "https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/";</script>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
<script>
(function () {
  'use strict';
  var loadmsg = document.getElementById('loadmsg');
  if (typeof window.ExcalidrawLib === 'undefined' || !window.ExcalidrawLib.Excalidraw || !window.React || !window.ReactDOM) {
    loadmsg.textContent = 'The whiteboard could not load. Check your internet connection and try again.';
    return;
  }
  var E = window.ExcalidrawLib;
  var React = window.React, ReactDOM = window.ReactDOM;
  var toOpener = function (payload) { try { if (window.opener && !window.opener.closed) window.opener.postMessage(payload, '*'); } catch (_) {} };

  // ── Graphic-organizer templates as Excalidraw element skeletons ──
  // convertToExcalidrawElements fills in ids/bindings; each is a starting
  // scaffold the student/teacher then writes into.
  var IND = '#4f46e5', TXT = '#1e293b';
  var TEMPLATES = {
    venn: [
      { type: 'ellipse', x: 120, y: 140, width: 320, height: 320, strokeColor: IND, backgroundColor: 'transparent', strokeWidth: 2 },
      { type: 'ellipse', x: 360, y: 140, width: 320, height: 320, strokeColor: '#0e7490', backgroundColor: 'transparent', strokeWidth: 2 },
      { type: 'text', x: 180, y: 110, text: 'Topic A', fontSize: 24, strokeColor: TXT },
      { type: 'text', x: 520, y: 110, text: 'Topic B', fontSize: 24, strokeColor: TXT },
      { type: 'text', x: 360, y: 470, text: 'Both', fontSize: 20, strokeColor: TXT }
    ],
    tchart: [
      { type: 'line', x: 400, y: 120, points: [[0, 0], [0, 420]], strokeColor: TXT, strokeWidth: 2 },
      { type: 'line', x: 120, y: 170, points: [[0, 0], [560, 0]], strokeColor: TXT, strokeWidth: 2 },
      { type: 'text', x: 230, y: 130, text: 'Heading 1', fontSize: 22, strokeColor: IND },
      { type: 'text', x: 510, y: 130, text: 'Heading 2', fontSize: 22, strokeColor: IND }
    ],
    story: [
      { type: 'rectangle', x: 90, y: 220, width: 180, height: 120, strokeColor: IND, label: { text: 'Beginning' } },
      { type: 'rectangle', x: 330, y: 220, width: 180, height: 120, strokeColor: IND, label: { text: 'Middle' } },
      { type: 'rectangle', x: 570, y: 220, width: 180, height: 120, strokeColor: IND, label: { text: 'End' } },
      { type: 'arrow', x: 275, y: 280, points: [[0, 0], [50, 0]], strokeColor: TXT },
      { type: 'arrow', x: 515, y: 280, points: [[0, 0], [50, 0]], strokeColor: TXT },
      { type: 'text', x: 330, y: 160, text: 'Story Map', fontSize: 26, strokeColor: TXT }
    ],
    kwl: [
      { type: 'rectangle', x: 90, y: 160, width: 210, height: 320, strokeColor: IND, backgroundColor: '#eef2ff' },
      { type: 'rectangle', x: 300, y: 160, width: 210, height: 320, strokeColor: '#0e7490', backgroundColor: '#ecfeff' },
      { type: 'rectangle', x: 510, y: 160, width: 210, height: 320, strokeColor: '#15803d', backgroundColor: '#f0fdf4' },
      { type: 'text', x: 120, y: 175, text: 'K — Know', fontSize: 20, strokeColor: TXT },
      { type: 'text', x: 320, y: 175, text: 'W — Want to know', fontSize: 18, strokeColor: TXT },
      { type: 'text', x: 540, y: 175, text: 'L — Learned', fontSize: 20, strokeColor: TXT }
    ],
    web: [
      { type: 'ellipse', x: 340, y: 260, width: 160, height: 100, strokeColor: IND, backgroundColor: '#eef2ff', label: { text: 'Main idea' } },
      { type: 'ellipse', x: 120, y: 120, width: 140, height: 80, strokeColor: TXT, label: { text: 'Detail' } },
      { type: 'ellipse', x: 580, y: 120, width: 140, height: 80, strokeColor: TXT, label: { text: 'Detail' } },
      { type: 'ellipse', x: 120, y: 420, width: 140, height: 80, strokeColor: TXT, label: { text: 'Detail' } },
      { type: 'ellipse', x: 580, y: 420, width: 140, height: 80, strokeColor: TXT, label: { text: 'Detail' } },
      { type: 'line', x: 340, y: 300, points: [[0, 0], [-150, -120]], strokeColor: TXT },
      { type: 'line', x: 500, y: 300, points: [[0, 0], [150, -120]], strokeColor: TXT },
      { type: 'line', x: 340, y: 320, points: [[0, 0], [-150, 130]], strokeColor: TXT },
      { type: 'line', x: 500, y: 320, points: [[0, 0], [150, 130]], strokeColor: TXT }
    ],
    numline: (function () {
      var els = [{ type: 'line', x: 120, y: 300, points: [[0, 0], [600, 0]], strokeColor: TXT, strokeWidth: 2 }];
      for (var i = 0; i <= 10; i++) {
        var x = 120 + i * 60;
        els.push({ type: 'line', x: x, y: 290, points: [[0, 0], [0, 20]], strokeColor: TXT, strokeWidth: 2 });
        els.push({ type: 'text', x: x - 5, y: 325, text: String(i), fontSize: 18, strokeColor: TXT });
      }
      return els;
    })()
  };

  var excalidrawAPI = null;
  var reactRoot = null;

  function mount() {
    var container = document.getElementById('excal');
    container.innerHTML = '';
    reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(React.createElement(E.Excalidraw, {
      excalidrawAPI: function (api) { excalidrawAPI = api; },
      // Warm, classroom-friendly defaults.
      initialData: { appState: { viewBackgroundColor: '#ffffff', currentItemStrokeColor: IND } },
      UIOptions: { canvasActions: { loadScene: true, saveToActiveFile: true, export: { saveFileToDisk: true }, toggleTheme: true } }
    }));
  }

  function loadTemplate(key) {
    if (!excalidrawAPI || !key || !TEMPLATES[key]) return;
    try {
      var skeleton = TEMPLATES[key];
      var elements = (typeof E.convertToExcalidrawElements === 'function')
        ? E.convertToExcalidrawElements(skeleton) : skeleton;
      excalidrawAPI.updateScene({ elements: elements });
      try { excalidrawAPI.scrollToContent(elements, { fitToContent: true }); } catch (_) {}
      toOpener({ type: 'allocwb-template', template: key });
    } catch (e) { console.warn('[Whiteboard] template load failed', e); }
  }

  function exportPng() {
    if (!excalidrawAPI || typeof E.exportToBlob !== 'function') return;
    var els = excalidrawAPI.getSceneElements();
    if (!els || !els.length) { alert('Draw something first, or pick a template.'); return; }
    E.exportToBlob({
      elements: els, appState: excalidrawAPI.getAppState(), files: excalidrawAPI.getFiles(),
      mimeType: 'image/png', quality: 1, exportPadding: 16
    }).then(function (blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = 'alloflow-whiteboard.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toOpener({ type: 'allocwb-export' });
    }).catch(function (e) { console.warn('[Whiteboard] export failed', e); });
  }

  // Boot
  mount();
  document.getElementById('tplSel').addEventListener('change', function (ev) { loadTemplate(ev.target.value); });
  document.getElementById('exportBtn').addEventListener('click', exportPng);
  var hello = function () { toOpener({ type: 'allocwb-hello' }); };
  hello(); setTimeout(hello, 900);
  window.addEventListener('beforeunload', function () { toOpener({ type: 'allocwb-closed' }); });
})();
</script>
</body>
</html>
