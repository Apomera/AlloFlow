  #     resources:
  #       limits:
  #         memory: 24G
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # ============================================================================
  # Reverse Proxy / API Gateway (Optional)
  # ============================================================================
  # Uncomment this section to enable unified API gateway
  # nginx:
  #   image: nginx:alpine
  #   container_name: alloflow-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "3000:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - pocketbase
  #     - ollama
  #     - piper
  #     - searxng
  #   networks:
  #     - alloflow
  #   labels:
  #     - "alloflow=proxy"

# ============================================================================
# Persistent Volumes
# ============================================================================
volumes:
  pocketbase_data:
    driver: local
  pb_hooks:
    driver: local
  ollama_data:
    driver: local
  searxng_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  alloflow:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================================================
# Service Endpoints
# ============================================================================
# Once running, access services at:
#
# - PocketBase Admin:  http://localhost:8090/_/
# - PocketBase API:    http://localhost:8090/api/
# - Ollama API:        http://localhost:11434
# - Piper TTS:         http://localhost:10400 (Wyoming protocol)
# - SearXNG:           http://localhost:8888
#
# Common Commands:
#   docker-compose up -d              # Start all services
#   docker-compose down               # Stop all services
#   docker-compose logs -f            # View live logs
#   docker-compose ps                 # Show running services
#   docker exec alloflow-ollama ollama pull mistral   # Pull a model
# ============================================================================
