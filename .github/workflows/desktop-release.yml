name: desktop-release

# Desktop packaging CI, aligned with the 2026-07-05 dependency split:
# Electron/electron-builder + the packaging scripts live in desktop/package.json
# (NOT the repo root), the builder config is desktop/electron-builder.json
# (tracked — the old root electron-builder.desktop.json never was, which is why
# this workflow could not have succeeded before), and the web bundle build
# needs desktop/web-app/node_modules (react-scripts). The :ci package scripts
# skip icon regeneration — desktop/build-resources/icon.ico is version-
# controlled, and rebuilding it would need Playwright browsers on CI for no
# benefit.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel to build'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - beta
  push:
    tags:
      - 'desktop-v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows installers
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ALLOFLOW_UPDATE_CHANNEL: ${{ inputs.channel || 'latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            desktop/web-app/package-lock.json
            desktop/package-lock.json
      - name: Install web app dependencies (react-scripts for the bundle build)
        working-directory: desktop/web-app
        run: npm ci --no-audit --no-fund
      - name: Install desktop dependencies (electron, electron-builder)
        working-directory: desktop
        run: npm ci --no-audit --no-fund
      - name: Audit desktop dependencies
        working-directory: desktop
        run: npm audit --audit-level=high
      - name: Use prerelease version for beta channel
        if: github.event_name == 'workflow_dispatch' && inputs.channel == 'beta'
        working-directory: desktop
        shell: pwsh
        run: |
          $base = node -p "require('./package.json').version.replace(/-.*/, '')"
          npm version --no-git-tag-version "$base-beta.$env:GITHUB_RUN_NUMBER"
      - name: Verify desktop sources and runtime
        working-directory: desktop
        run: npm run verify:release
      - name: Require Windows signing credentials for tagged releases
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            throw 'Tagged desktop releases require WINDOWS_CSC_LINK and WINDOWS_CSC_KEY_PASSWORD.'
          }
      - name: Build Windows x64 and ARM64 installers
        working-directory: desktop
        shell: pwsh
        run: |
          if (-not $env:CSC_LINK) { Remove-Item Env:CSC_LINK,Env:CSC_KEY_PASSWORD -ErrorAction SilentlyContinue }
          # Flavored desktop edition — the shipped product (guided first-run
          # wizard, full-screen app boot, "Choose your experience" installer
          # page). The unflavored package:win:ci build boots into the console
          # and must not be released as AlloFlow Desktop.
          npm run package:desktop:win
      - name: Drill packaged Windows app layouts
        working-directory: desktop
        run: npm run verify:package-layout:win
      - name: Write Windows installer checksums
        working-directory: desktop
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Filter 'AlloFlow-Desktop-*.exe' -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content -Encoding ascii dist/SHA256SUMS-windows.txt
      - name: Verify desktop artifacts
        working-directory: desktop
        run: npm run verify:artifacts:win
      - name: Verify Windows Authenticode signatures
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        working-directory: desktop
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -Path dist -Filter 'AlloFlow-Desktop-*.exe' -File)
          if ($installers.Count -eq 0) { throw 'No Windows executables were produced.' }
          foreach ($installer in $installers) {
            $signature = Get-AuthenticodeSignature -LiteralPath $installer.FullName
            if ($signature.Status -ne 'Valid') {
              throw "$($installer.Name) is not validly signed: $($signature.Status) $($signature.StatusMessage)"
            }
          }
      - name: Smoke-test Windows installer on clean runner
        working-directory: desktop
        shell: pwsh
        run: npm run verify:installer:win
      - uses: actions/upload-artifact@v4
        with:
          name: alloflow-desktop-windows
          path: |
            desktop/dist/AlloFlow-Desktop-*.exe
            desktop/dist/AlloFlow-Desktop-*.exe.blockmap
            desktop/dist/*.yml
            desktop/dist/builder-debug.yml
            desktop/dist/SHA256SUMS-windows.txt
            desktop/WINDOWS-INSTALL.md
          if-no-files-found: error

  mac:
    name: macOS packages
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ALLOFLOW_UPDATE_CHANNEL: ${{ inputs.channel || 'latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            desktop/web-app/package-lock.json
            desktop/package-lock.json
      - name: Install web app dependencies (react-scripts for the bundle build)
        working-directory: desktop/web-app
        run: npm ci --no-audit --no-fund
      - name: Install desktop dependencies (electron, electron-builder)
        working-directory: desktop
        run: npm ci --no-audit --no-fund
      - name: Audit desktop dependencies
        working-directory: desktop
        run: npm audit --audit-level=high
      - name: Use prerelease version for beta channel
        if: github.event_name == 'workflow_dispatch' && inputs.channel == 'beta'
        working-directory: desktop
        run: |
          BASE="$(node -p "require('./package.json').version.replace(/-.*/, '')")"
          npm version --no-git-tag-version "$BASE-beta.$GITHUB_RUN_NUMBER"
      - name: Verify desktop sources and runtime
        working-directory: desktop
        run: npm run verify:release
      - name: Require macOS signing and notarization credentials for tagged releases
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Tagged desktop releases require $name."
              exit 1
            fi
          done
      - name: Build macOS x64 and ARM64 packages
        working-directory: desktop
        env:
          # No signing identity on unsigned CI builds — don't hunt the keychain.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && 'true' || 'false' }}
        run: |
          # Missing secrets arrive as EMPTY env vars; electron-builder treats an
          # empty CSC_LINK as a real path and dies with "<projectDir> not a file".
          if [ -z "$CSC_LINK" ]; then unset CSC_LINK CSC_KEY_PASSWORD; fi
          # Flavored desktop edition — see the Windows job note.
          npm run package:desktop:mac
      - name: Drill packaged macOS app layouts
        working-directory: desktop
        run: npm run verify:package-layout:mac
      - name: Verify desktop artifacts
        working-directory: desktop
        run: npm run verify:artifacts:mac
      - name: Verify macOS signatures and notarization staples
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        working-directory: desktop
        shell: bash
        run: |
          shopt -s nullglob
          apps=(dist/mac*/AlloFlow\ Desktop.app)
          dmgs=(dist/AlloFlow-Desktop-*.dmg)
          if [ ${#apps[@]} -eq 0 ] || [ ${#dmgs[@]} -eq 0 ]; then
            echo "::error::Signed app bundles or DMGs are missing."
            exit 1
          fi
          for app in "${apps[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl --assess --type execute --verbose=2 "$app"
          done
          for dmg in "${dmgs[@]}"; do
            xcrun stapler validate "$dmg"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: alloflow-desktop-macos
          path: |
            desktop/dist/AlloFlow-Desktop-*.dmg
            desktop/dist/AlloFlow-Desktop-*.zip
            desktop/dist/AlloFlow-Desktop-*.dmg.blockmap
            desktop/dist/AlloFlow-Desktop-*.zip.blockmap
            desktop/dist/*.yml
            desktop/dist/builder-debug.yml
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    needs: [windows, mac]
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/**/*
