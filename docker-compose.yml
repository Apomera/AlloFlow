# AlloFlow "School Box" — Quick Start
#
# This file provides the complete local AI stack.
# Run from project root:
#
#   docker compose up -d                          # Core (no GPU)
#   docker compose --profile gpu up -d            # Full (with Flux image gen)
#
# Access at: http://localhost:3000
#
# For detailed configuration, see docker/README.md
# For .env configuration, copy docker/.env.example to docker/.env

version: '3.8'

services:
  # ── Frontend (AlloFlow React App) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        REACT_APP_DATA_BACKEND: auto
        REACT_APP_POCKETBASE_URL: http://localhost:8090
    container_name: alloflow-frontend
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  # ── Local Database (PocketBase) ────────────────────────────────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: alloflow-pocketbase
    ports:
      - "${PB_PORT:-8090}:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
      - ./docker/pocketbase/pb_schema.json:/pb/pb_migrations/schema.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── LLM (Ollama) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: alloflow-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Image Gen (Flux — GPU required) ───────────────────────────
  flux:
    build:
      context: ./docker/flux-server
      dockerfile: Dockerfile
    container_name: alloflow-flux
    ports:
      - "${FLUX_PORT:-7860}:7860"
    environment:
      - FLUX_MODEL=black-forest-labs/FLUX.1-schnell
      - PORT=7860
      - HF_HOME=/models
    volumes:
      - flux_models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu

  # ── TTS (Edge TTS — neural, online) ───────────────────────────
  edge-tts:
    build:
      context: ./docker/edge-tts-server
      dockerfile: Dockerfile
    container_name: alloflow-edge-tts
    ports:
      - "${TTS_PORT:-5001}:5001"
    restart: unless-stopped

  # ── TTS (Piper — offline fallback) ────────────────────────────
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: alloflow-piper
    ports:
      - "${PIPER_PORT:-10200}:10200"
    volumes:
      - piper_data:/data
    command: --voice en_US-amy-medium --data-dir /data --download-dir /data
    restart: unless-stopped

  # ── Web Search (SearXNG) ──────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: alloflow-searxng
    ports:
      - "${SEARCH_PORT:-8888}:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng
    restart: unless-stopped

volumes:
  pocketbase_data:
  ollama_data:
  flux_models:
  piper_data:
  searxng_data:
