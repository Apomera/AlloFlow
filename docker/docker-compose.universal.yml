# ══════════════════════════════════════════════════════════════════
#  AlloFlow Universal Docker Compose — Auto-Detecting GPU Support
#  
#  Automatically detects and configures for:
#    ✅ NVIDIA GPUs (CUDA)
#    ✅ AMD GPUs (ROCm)
#    ✅ Apple Silicon (Metal Performance Shaders)
#    ✅ CPU-only fallback (automatic)
#
#  Before running:
#    1. The AlloFlow app auto-detects your GPU
#    2. Generate .env file: gpu-detection.js
#    3. Run: docker compose up -d
#
#  GPU Configuration:
#    • NVIDIA: Requires NVIDIA Container Toolkit
#    • AMD: Requires ROCm Docker support
#    • Apple Silicon: Works natively (auto-detected)
#    • CPU: Works everywhere, slower
#
# ══════════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ── Local Database (PocketBase — works on all GPUs) ───────
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: alloflow-pocketbase
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    restart: unless-stopped
    networks:
      - alloflow-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    environment:
      - POCKETBASE_INITIAL_USER_NAME=admin@alloflow.local
      - POCKETBASE_INITIAL_USER_PASSWORD=changeme

  # ── LLM Backend (Ollama — GPU auto-detected) ────────────
  # GPU Support:
  #   • NVIDIA CUDA: Uses all GPUs via NVIDIA Container Toolkit
  #   • AMD ROCm: Uses all GPUs via ROCm driver (HIP)
  #   • Apple Silicon: Auto-uses Metal Performance Shaders on arm64
  #   • CPU: Falls back to CPU inference (slower)
  ollama:
    image: ollama/ollama:latest
    container_name: alloflow-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - alloflow-backend
    restart: unless-stopped
    environment:
      # GPU driver auto-selected by Ollama based on runtime
      - OLLAMA_GPU=${OLLAMA_GPU:-0}  # 1=enabled, 0=CPU only
      # Only set ROCM for AMD systems
      - ROCM_VISIBLE_DEVICES=${ROCM_VISIBLE_DEVICES:-0}
      # Metal on Apple Silicon (auto-detected)
      - METAL_DEVICE=${METAL_DEVICE:-0}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    # Conditional GPU assignment
    # Deploy section gets populated by docker-compose.override.yml per GPU type
    deploy: {}

  # ── Image Generation (Flux.1-schnell) ────────────────────
  # GPU Strategy:
  #   • NVIDIA: Requires 8GB+ VRAM, GPU acceleration critical
  #   • AMD: Works but slower than CUDA (ROCm maturity)
  #   • Apple Silicon: Works but slower (Metal vs specialized AI accelerators)
  #   • CPU: Very slow, ~30+ minutes per image
  #
  # Fallback: If GPU unavailable or OOM, falls back to cloud API (Gemini/GPT-4)
  flux:
    build:
      context: ./flux-server
      dockerfile: Dockerfile
      # Multi-stage: cuda/rocm/metal based on build arg
      args:
        - BASE_IMAGE=pytorch/pytorch:latest  # Contains CUDA by default
    container_name: alloflow-flux
    ports:
      - "127.0.0.1:7860:7860"
    networks:
      - alloflow-backend
    environment:
      - FLUX_MODEL=${FLUX_MODEL:-black-forest-labs/FLUX.1-schnell}
      - PORT=7860
      - MAX_IMAGE_SIZE=1024
      - HF_HOME=/models
      # GPU-specific env vars
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
      - ROCM_VISIBLE_DEVICES=${ROCM_VISIBLE_DEVICES:-}
      - TORCH_HOME=/models
    volumes:
      - flux_models:/models
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    # Conditional GPU assignment
    deploy: {}

  # ── Text-to-Speech (Piper — offline, no GPU needed) ──────
  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: alloflow-piper
    ports:
      - "127.0.0.1:10200:10200"
    volumes:
      - piper_data:/data
    networks:
      - alloflow-backend
    command: >
      --voice en_US-amy-medium
      --data-dir /data
      --download-dir /data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10200/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Web Search (SearXNG — private, no GPU needed) ───────
  searxng:
    image: searxng/searxng:latest
    container_name: alloflow-searxng
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-ChangeMe_Min32Chars_required!}
    volumes:
      - searxng_data:/etc/searxng
    networks:
      - alloflow-backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  pocketbase_data:
    driver: local
  ollama_data:
    driver: local
  flux_models:
    driver: local
  piper_data:
    driver: local
  searxng_data:
    driver: local

networks:
  alloflow-network:
    driver: bridge
  alloflow-backend:
    driver: bridge
    internal: false

# ══════════════════════════════════════════════════════════════════
# GPU-Specific Configuration:
#
# This base file works for CPU-only. For GPU support, the AlloFlow
# app generates a docker-compose.override.yml with GPU device config:
#
# Example NVIDIA override (auto-generated):
# ---
# services:
#   ollama:
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: nvidia
#               count: all
#               capabilities: [gpu]
#   flux:
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: nvidia
#               count: 1
#               capabilities: [gpu]
# ---
#
# Example AMD override (auto-generated):
# ---
# services:
#   ollama:
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: rocm
#               count: all
#               capabilities: [gpu]
#   flux:
#     deploy:
#       resources:
#         reservations:
#           devices:
#             - driver: rocm
#               count: 1
#               capabilities: [gpu]
# ---
#
# Example Apple Silicon (auto-generated):
# ---
# services:
#   ollama:
#     environment:
#       - OLLAMA_GPU=1
#   flux:
#     environment:
#       - TORCH_DEVICE=mps
# ---
#
# ══════════════════════════════════════════════════════════════════
