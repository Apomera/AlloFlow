appId: "com.alloflow.admin"
productName: "AlloFlow Admin"

# Ensure main.js is used as entry point (not build/electron.js)
extraMetadata:
  main: "main.js"

# Files to include in packaging
# Service files in src/ are required by main.js via require()

directories:
  buildResources: "assets"
  output: "dist"

# Auto-update configuration (optional - uncomment and set when deploying)
# To enable updates, set these environment variables before building:
#   export UPDATE_SERVER_URL="https://updates.alloflow.com/production"
#   export UPDATE_CHANNEL="production"
# Then uncomment the publish section below:

# publish:
#   - provider: "generic"
#     url: "${UPDATE_SERVER_URL}"  # Set via environment variable
#     channel: "${UPDATE_CHANNEL}"  # 'test' or 'production'
#   # Alternative: GitHub Releases
#   # - provider: "github"
#   #   owner: "yourusername"
#   #   repo: "AlloFlow"

files:
  - "main.js"
  - "preload.js"
  - "gpu-detection.js"
  - "src/**/*"
  - "build/**/*"
  - "node_modules/**/*"

extraResources:
  - from: "../docker"
    to: "docker"

win:
  target:
    - nsis
  certificateFile: null
  certificatePassword: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "AlloFlow Admin"
  allowElevation: true
  perMachine: true
  # TODO: Add icon files (assets/icon.ico)
  # installerIcon: "assets/icon.ico"
  # uninstallerIcon: "assets/icon.ico"
  # Uninstaller will appear in Windows "Programs and Features"
  displayLanguageSelector: true
  menuCategory: true
  runAfterFinish: true

mac:
  target:
    - dmg
    - zip
  category: "public.app-category.utilities"
  identity: null
  extraResources:
    - from: "assets/uninstall.sh"
      to: "uninstall.sh"
  # macOS uninstall: Users drag app to Trash
  # For complete removal, run: /Applications/AlloFlow Admin.app/Contents/Resources/uninstall.sh

dmg:
  contents:
    - x: 110
      y: 150
      type: "file"
    - x: 240
      y: 150
      type: "link"
      path: "/Applications"

linux:
  target:
    - AppImage
  category: "Utility"
