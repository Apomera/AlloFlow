name = "alloflow-catalog-submit"
main = "src/index.js"
compatibility_date = "2026-04-01"

# The GitHub repo this Worker writes to. Override per-deploy via wrangler vars
# if you fork. Do NOT put any secret here. Secrets live in `wrangler secret put`.
[vars]
GITHUB_OWNER = "Apomera"
GITHUB_REPO  = "AlloFlow"
GITHUB_BRANCH = "main"

# OPTIONAL — reviewed PD credential adapter (POST /issuePd, /verifyPd, GET /pdIssuerKey).
# Keep every setting below unset until an authorized issuer assigns the identity,
# key custody, and trusted upstream review service. Reviewed issuance requires:
# PD_ISSUER_PUBLIC_KEY = "REPLACE_WITH_REVIEWED_SPKI_BASE64"  # public [vars] value
# PD_ISSUER_NAME = "REPLACE_WITH_AUTHORIZED_ISSUER_NAME"
# PD_ISSUER_ID = "REPLACE_WITH_AUTHORIZED_ISSUER_ID"
# PD_ISSUER_KEY_ID = "REPLACE_WITH_REVIEWED_KEY_ID"
# secret: wrangler secret put PD_ISSUER_PRIVATE_KEY
# secret: wrangler secret put PD_ISSUER_AUTH_TOKEN
# Never ship either secret in browser code, module JSON, localStorage, or LMS URLs.
# The Worker authenticates the review-service caller and validates internal bindings;
# the upstream service remains responsible for identity, authorization, evidence,
# accessibility review, and replay prevention within that upstream workflow.
# The Worker separately enforces create-once credential issuance by decision ID.
#
# Reviewed issuance also requires a PRIVATE, strongly consistent R2 ledger.
# Do not substitute an eventually consistent KV namespace:
#   npx wrangler r2 bucket create alloflow-pd-issuance-ledger
# Then uncomment and set the deployment bucket name:
# [[r2_buckets]]
# binding = "PD_ISSUANCE_LEDGER"
# bucket_name = "alloflow-pd-issuance-ledger"
# Missing, corrupt, or unavailable ledger storage disables reviewed issuance.
# The self-paced lane below does not use this institutional ledger.
#
# Browser-requested self-paced signing is OFF by default. If deliberately enabled,
# it requires a separate keypair and identity and remains explicitly non-institutional:
# PD_ALLOW_SELF_PACED_ISSUANCE = "true"
# PD_SELF_PACED_PUBLIC_KEY = "REPLACE_WITH_SELF_PACED_SPKI_BASE64"
# secret: wrangler secret put PD_SELF_PACED_PRIVATE_KEY
# optional: PD_SELF_PACED_KEY_ID, PD_SELF_PACED_ISSUER_NAME, PD_SELF_PACED_ISSUER_ID
# Never reuse reviewed signing keys or reviewed issuer identities for this profile.

# Private KV store for bug reports (POST /submitBug). These carry error logs + free
# text that can include student-identifiable data, so they go to PRIVATE KV — NOT the
# public GitHub repo (unlike lessons/translations). One-time setup:
#   npx wrangler kv namespace create BUG_REPORTS
# then paste the printed id below (and, optionally, create a preview namespace for dev).
# Optional: `npx wrangler secret put ADMIN_TOKEN` to enable the token-gated GET /bugs reader.
[[kv_namespaces]]
binding = "BUG_REPORTS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Private KV store for PD module submissions (POST /submitPd). Educator-authored
# PD modules are staged here for manual review, NOT committed to the public repo.
# One-time setup:
#   npx wrangler kv namespace create PD_SUBMISSIONS
# then paste the printed id below. Until then, /submitPd returns 500 (fail-closed).
[[kv_namespaces]]
binding = "PD_SUBMISSIONS"
id = "REPLACE_WITH_PD_KV_NAMESPACE_ID"

# Private KV store for Tool Forge plugin submissions (POST /submitPlugin). A submission
# is one self-registering plugin .js file + metadata + the client validator report,
# staged here for MANUAL review — never auto-committed and never run server-side. The
# maintainer reviews source + report + a sandboxed preview, then drops the file into
# PLUGIN_FILES and deploys (the human gate). One-time setup:
#   npx wrangler kv namespace create PLUGIN_SUBMISSIONS
# then paste the printed id below. Until then, /submitPlugin returns 500 (fail-closed).
# Read the queue with the ADMIN_TOKEN-gated GET /pluginSubmissions (?source=1 for code).
[[kv_namespaces]]
binding = "PLUGIN_SUBMISSIONS"
id = "REPLACE_WITH_PLUGIN_KV_NAMESPACE_ID"

# Limits applied at the Worker level. Submission max size is also enforced
# inside the handler; this is a backstop.
[limits]
cpu_ms = 50

# Local dev settings
[dev]
port = 8787
